trigger:
  - main

variables:
  # Azure Resource Manager connection created during pipeline creation

  # Web app name
  webAppName: 'laravel'
  phpVersion: '8.3'
  # Agent VM image name
  vmImageName: 'ubuntu-latest'
  # Environment name
  environmentName: 'apppp_group'
  # Root folder under which your composer.json file is available.
  rootFolder: $(System.DefaultWorkingDirectory)

stages:
  - stage: Build
    displayName: Build stage
    variables:
      phpVersion: '8.3'
      azureServicesConnection: 'bani_sc'
    jobs:
      - job: BuildJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - script: |
              sudo apt install php8.3
              sudo update-alternatives --set php /usr/local/bin/php$(phpVersion)
              sudo update-alternatives --set phar /usr/local/bin/phar$(phpVersion)
              sudo update-alternatives --set phpdbg /usr/local/bin/phpdbg$(phpVersion)
              sudo update-alternatives --set php-cgi /usr/local/bin/php-cgi$(phpVersion)
              sudo update-alternatives --set phar.phar /usr/local/bin/phar.phar$(phpVersion)
              php -version
            workingDirectory: $(rootFolder)
            displayName: 'Use PHP version $(phpVersion)'

          - script: |
              composer clear-cache
              composer self-update
              composer update --ignore-platform-reqs
              composer install --ignore-platform-reqs --no-interaction --prefer-dist --optimize-autoloader
            workingDirectory: $(rootFolder)
            displayName: 'Composer install'

          - task: ArchiveFiles@2
            displayName: 'Archive files'
            inputs:
              rootFolderOrFile: '$(rootFolder)'
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
              replaceExistingArchive: true

          - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
            displayName: 'Upload package'
            artifact: drop

  - stage: Deploy
    displayName: 'Deploy Web App'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeploymentJob
        pool:
          vmImage: $(vmImageName)
        environment: $(environmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy Azure Web App: $(webAppName)'
                  inputs:
                    azureSubscription: 'bani_sc'
                    appName: $(webAppName)
                    appType: webAppLinux
                    package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip
